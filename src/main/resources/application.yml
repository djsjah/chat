server:
  port: 3000

springdoc:
  swagger-ui:
    path: /api
    url: /openapi.yml
    disable-swagger-default-url: true
    oauth:
      client-id: chat-swagger
      use-pkce-with-authorization-code-grant: true
      additionalQueryStringParams:
        prompt: login
    oauth2RedirectUrl: http://localhost:3000/swagger-ui/oauth2-redirect.html
  api-docs:
    path: /api-docs

spring:
  application:
    name: chat-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 20

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:database/changelog/database.changelog-master.yml

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  file:
    name: logs/chat-service.log
  level:
    root: INFO
    com.chat: DEBUG
  include-application-name: false
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"

realtime-server:
  secret-key: ${REALTIME_SERVER_SECRET_KEY}
  outbox:
    partitions: 1