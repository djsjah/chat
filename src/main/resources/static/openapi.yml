openapi: 3.0.3
info:
  title: Education Platform Chat Service API
  version: 0.1.0
  description: REST API for a student-mentor chat service on an educational platform

servers:
  - url: http://localhost:3000/api

tags:
  - name: Members
    description: Chat room participant (student or mentor)
  - name: Rooms
    description: Chat rooms
  - name: Messages
    description: Chat messages
  - name: Realtime
    description: Token generation for Realtime-Server connection and subscriptions
  - name: Admin Members
    description: Administrative operations on members
  - name: Admin Rooms
    description: Administrative operations on rooms
  - name: Admin Messages
    description: Administrative operations on messages

paths:
  /realtime/token/connection:
    get:
      tags:
        - Realtime
      summary: Generate connection token for the Realtime-Server channel
      description: Generates a JWT connection token for the currently authenticated member
      operationId: generateConnectionToken
      security:
        - keycloak: []
      responses:
        '200':
          description: Connection token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeTokenDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /realtime/token/subscription/room/{roomId}:
    get:
      tags:
        - Realtime
      summary: Generate subscription token for the Realtime-Server channel
      description: Generates a JWT subscription token for the specified room if the current member belongs to it
      operationId: generateSubscriptionToken
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Chat room identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Subscription token generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RealtimeTokenDTO'
        '400':
          description: Invalid value for parameter 'roomId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /rooms/{roomId}/messages:
    get:
      tags:
        - Rooms
      summary: Get room messages
      description: Returns a paginated slice of messages for the specified room if the current member has access to it
      operationId: getMessagesByRoomId
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Chat room identifier
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          description: Zero-based page index
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Page size
          schema:
            type: integer
            format: int32
            default: 20
            minimum: 1
      responses:
        '200':
          description: Messages returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageRoomSliceDTO'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

    post:
      tags:
        - Rooms
      summary: Create room message
      description: Creates a new message in the specified room if the current member has access to it
      operationId: createMessage
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Chat room identifier
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageCreateDTO'
      responses:
        '201':
          description: Message created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRoomDTO'
        '400':
          description: Invalid request data or parent message must be in the same room
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /messages/{messageId}:
    get:
      tags:
        - Messages
      summary: Get message by id
      description: Returns a message if the current member has access to it
      operationId: getMessageById
      security:
        - keycloak: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Message identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Message returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponseDTO'
        '400':
          description: Invalid value for parameter 'messageId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

    patch:
      tags:
        - Messages
      summary: Update message by id
      description: Updates a message if the current member is its author and has access to it
      operationId: patchMessageById
      security:
        - keycloak: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Message identifier
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessagePatchDTO'
      responses:
        '200':
          description: Message updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRoomDTO'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

    delete:
      tags:
        - Messages
      summary: Delete message by id
      description: Deletes a message if the current member is its author and has access to it
      operationId: deleteMessageById
      security:
        - keycloak: []
      parameters:
        - name: messageId
          in: path
          required: true
          description: Message identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Message deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithRoomDTO'
        '400':
          description: Invalid value for parameter 'messageId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested message or room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /members/{memberId}:
    get:
      tags:
        - Members
      summary: Get member by id
      description: Returns a member by identifier
      operationId: getMemberById
      security:
        - keycloak: []
      parameters:
        - name: memberId
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Member returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponseDTO'
        '400':
          description: Invalid value for parameter 'memberId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /members:
    post:
      tags:
        - Members
      summary: Create current member
      description: Creates the current authenticated member if it does not exist yet
      operationId: createMember
      security:
        - keycloak: []
      responses:
        '201':
          description: Member created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponseDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/rooms/{roomId}/messages:
    get:
      tags:
        - Admin Rooms
      summary: Get room messages as admin
      description: Returns a paginated slice of messages for the specified room
      operationId: getRoomMessagesByRoomIdForAdmin
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room identifier
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          description: Zero-based page index
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Page size
          schema:
            type: integer
            format: int32
            default: 20
            minimum: 1
      responses:
        '200':
          description: Room messages returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageRoomSliceDTO'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/rooms:
    post:
      tags:
        - Admin Rooms
      summary: Create room as admin
      description: Creates a new chat room
      operationId: createRoomForAdmin
      security:
        - keycloak: []
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomResponseDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/rooms/{roomId}/members/{memberId}:
    post:
      tags:
        - Admin Rooms
      summary: Join member to room as admin
      description: Adds the specified member to the specified room
      operationId: joinMemberToRoomForAdmin
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room identifier
          schema:
            type: integer
            format: int64
        - name: memberId
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
            format: int64
      responses:
        '201':
          description: Member joined room successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomWithMemberDTO'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room or member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

    delete:
      tags:
        - Admin Rooms
      summary: Remove member from room as admin
      description: Removes the specified member from the specified room
      operationId: removeMemberFromRoomForAdmin
      security:
        - keycloak: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: Room identifier
          schema:
            type: integer
            format: int64
        - name: memberId
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Member removed from room successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminRoomResponseDTO'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested room or member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/messages/{id}:
    get:
      tags:
        - Admin Messages
      summary: Get message by id as admin
      description: Returns a message by identifier
      operationId: getMessageByIdForAdmin
      security:
        - keycloak: []
      parameters:
        - name: id
          in: path
          required: true
          description: Message identifier
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Message returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageExtendedDTO'
        '400':
          description: Invalid value for parameter 'id'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/members/{memberId}/messages:
    get:
      tags:
        - Admin Members
      summary: Get member messages as admin
      description: Returns a paginated slice of messages for the specified member
      operationId: getMemberMessagesByIdForAdmin
      security:
        - keycloak: []
      parameters:
        - name: memberId
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          description: Zero-based page index
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Page size
          schema:
            type: integer
            format: int32
            default: 20
            minimum: 1
      responses:
        '200':
          description: Member messages returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageMemberSliceDTO'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

  /admin/members/{memberId}:
    delete:
      tags:
        - Admin Members
      summary: Delete member by id as admin
      description: Marks the specified member as deleted
      operationId: deleteMemberByIdForAdmin
      security:
        - keycloak: []
      parameters:
        - name: memberId
          in: path
          required: true
          description: Member identifier
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Member deleted successfully
        '400':
          description: Invalid value for parameter 'memberId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '403':
          description: Forbidden. Requires role admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'
        '404':
          description: Requested member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorDTO'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiDefaultErrorDTO'

components:
  securitySchemes:
    keycloak:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: http://localhost:8081/realms/chat/protocol/openid-connect/auth
          tokenUrl: http://localhost:8081/realms/chat/protocol/openid-connect/token
          scopes: {}

  schemas:
    RealtimeTokenDTO:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT token for Realtime-Server connection or subscription
          example: <jwt-token>

    ApiErrorDTO:
      type: object
      required:
        - status
        - error
        - message
      properties:
        status:
          type: integer
          format: int32
          example: 404
        error:
          type: string
          example: Not Found
        message:
          oneOf:
            - type: string
              example: Requested room not found
            - type: array
              items:
                $ref: '#/components/schemas/FieldErrorDTO'

    FieldErrorDTO:
      type: object
      required:
        - field
        - error
      properties:
        field:
          type: string
          example: content
        error:
          type: string
          example: must not be blank

    ApiDefaultErrorDTO:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
          example: 403
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Access Denied
        path:
          type: string
          example: /api/messages/1

    MessageCreateDTO:
      type: object
      required:
        - content
      properties:
        parentId:
          type: integer
          format: int64
          nullable: true
          description: Parent message identifier
        content:
          type: string
          description: Message text
          minLength: 1
          example: Hello, mentor!

    MessagePatchDTO:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Updated message text
          minLength: 1
          example: Updated message text

    MessageResponseDTO:
      type: object
      required:
        - id
        - roomId
        - memberId
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        roomId:
          type: integer
          format: int64
        memberId:
          type: integer
          format: int64
        parentId:
          type: integer
          format: int64
          nullable: true
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    MessageRoomSliceDTO:
      type: object
      required:
        - room
        - messages
        - messagePagination
      properties:
        room:
          $ref: '#/components/schemas/RoomResponseDTO'
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageItemDTO'
        messagePagination:
          $ref: '#/components/schemas/MessagePaginationDTO'

    MessageItemDTO:
      type: object
      required:
        - id
