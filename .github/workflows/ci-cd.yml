name: CI-CD

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:

jobs:
  ci:
    name: Build, start application and validate infrastructure
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chat
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      KEYCLOAK_ISSUER_URI: ${{ secrets.KEYCLOAK_ISSUER_URI }}
      REALTIME_SERVER_SECRET_KEY: ${{ secrets.REALTIME_SERVER_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build project
        run: ./gradlew build

      - name: Build boot jar
        run: ./gradlew bootJar

      - name: Start application from jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" ! -name "*-plain.jar" | head -n 1)
          echo "Using jar: $JAR_FILE"
          nohup java -jar "$JAR_FILE" > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for application health endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          echo "Application failed to start"
          cat app.log
          exit 1

      - name: Validate Keycloak docker-compose
        run: docker compose -f deploy/keycloak/docker-compose.yml config

      - name: Validate Monitoring docker-compose
        run: docker compose -f deploy/monitoring/docker-compose.yml config

      - name: Start Keycloak stack
        run: docker compose -f deploy/keycloak/docker-compose.yml up -d

      - name: Wait for Keycloak realm endpoint
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8081/realms/chat > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Keycloak failed to start"
          docker compose -f deploy/keycloak/docker-compose.yml ps
          docker compose -f deploy/keycloak/docker-compose.yml logs
          exit 1

      - name: Start Monitoring stack
        run: docker compose -f deploy/monitoring/docker-compose.yml up -d

      - name: Wait for Prometheus readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:9090/-/ready > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Prometheus failed to start"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Wait for Loki readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3100/ready > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Loki failed to start"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Wait for Tempo readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3200/ready > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Tempo failed to start"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Wait for Grafana health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/api/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Grafana failed to start"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Verify Alloy container is running
        run: |
          CONTAINER_ID=$(docker compose -f deploy/monitoring/docker-compose.yml ps -q alloy)
          if [ -z "$CONTAINER_ID" ]; then
            echo "Alloy container was not created"
            docker compose -f deploy/monitoring/docker-compose.yml ps
            docker compose -f deploy/monitoring/docker-compose.yml logs
            exit 1
          fi

          STATUS=$(docker inspect -f '{{.State.Status}}' "$CONTAINER_ID")
          echo "Alloy status: $STATUS"

          if [ "$STATUS" != "running" ]; then
            echo "Alloy container is not running"
            docker compose -f deploy/monitoring/docker-compose.yml ps
            docker compose -f deploy/monitoring/docker-compose.yml logs
            exit 1
          fi

      - name: Verify Prometheus sees chat-service target
        run: |
          for i in {1..60}; do
            RESPONSE=$(curl -fsS --get \
              --data-urlencode 'query=up{job="chat-service"}' \
              http://localhost:9090/api/v1/query)

            echo "$RESPONSE"

            python - <<'PY' "$RESPONSE"
import json, sys
data = json.loads(sys.argv[1])
result = data.get("data", {}).get("result", [])
ok = any(item.get("value", [None, "0"])[1] == "1" for item in result)
raise SystemExit(0 if ok else 1)
PY
            if [ $? -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Prometheus did not report chat-service as UP"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Verify Loki ingests application logs
        run: |
          for i in {1..60}; do
            RESPONSE=$(curl -fsS --get \
              --data-urlencode 'query={job="chat-service-file"}' \
              --data-urlencode 'limit=1' \
              http://localhost:3100/loki/api/v1/query)

            echo "$RESPONSE"

            python - <<'PY' "$RESPONSE"
import json, sys
data = json.loads(sys.argv[1])
result = data.get("data", {}).get("result", [])
raise SystemExit(0 if result else 1)
PY
            if [ $? -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Loki did not ingest chat-service logs"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          exit 1

      - name: Trigger trace candidate via actuator health
        run: |
          for i in {1..10}; do
            if curl -fsS http://localhost:3000/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Could not trigger actuator health request"
          exit 1

      - name: Verify Tempo sees chat-service traces
        run: |
          for i in {1..60}; do
            RESPONSE=$(curl -fsS --get \
              --data-urlencode 'tags=service.name=chat-service' \
              http://localhost:3200/api/search)

            echo "$RESPONSE"

            python - <<'PY' "$RESPONSE"
import json, sys
data = json.loads(sys.argv[1])
traces = data.get("traces", [])
raise SystemExit(0 if traces else 1)
PY
            if [ $? -eq 0 ]; then
              exit 0
            fi

            sleep 5
          done

          echo "Tempo did not return traces for service.name=chat-service"
          docker compose -f deploy/monitoring/docker-compose.yml ps
          docker compose -f deploy/monitoring/docker-compose.yml logs
          echo "Application log tail:"
          tail -n 200 app.log || true
          exit 1

      - name: Stop Monitoring stack
        if: always()
        run: docker compose -f deploy/monitoring/docker-compose.yml down -v

      - name: Stop Keycloak stack
        if: always()
        run: docker compose -f deploy/keycloak/docker-compose.yml down -v

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi

  cd:
    name: Prepare deploy artifact
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      DB_URL: ${{ secrets.DB_URL }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      KEYCLOAK_ISSUER_URI: ${{ secrets.KEYCLOAK_ISSUER_URI }}
      REALTIME_SERVER_SECRET_KEY: ${{ secrets.REALTIME_SERVER_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build boot jar
        run: ./gradlew bootJar

      - name: Remove plain jar
        run: rm -f build/libs/*-plain.jar

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-service-deployable
          path: build/libs/*.jar